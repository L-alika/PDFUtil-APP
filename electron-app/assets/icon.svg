<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient (Clean white to soft light grey) -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f8fafc" />
    </linearGradient>

    <!-- App Red Theme Gradient -->
    <linearGradient id="appRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444" /> <!-- Tailwind red-500 -->
      <stop offset="100%" stop-color="#dc2626" /> <!-- Tailwind red-600 -->
    </linearGradient>

    <!-- Document White Gradient -->
    <linearGradient id="docWhite" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </linearGradient>

    <!-- Soft Drop Shadow for elements -->
    <filter id="softShadow" x="-10%" y="-10%" width="125%" height="125%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12" />
    </filter>
  </defs>

  <!-- Rounded Rectangle App Icon Base -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" stroke="#e2e8f0" stroke-width="4" />

  <!-- Background decorative pattern (subtle grid or circles) -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#ef4444" stroke-width="2" stroke-opacity="0.05" />
  <circle cx="256" cy="256" r="200" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-opacity="0.08" stroke-dasharray="12, 10" />

  <!-- Document Graphics Group with shadow -->
  <g filter="url(#softShadow)">
    <!-- Document 1: PDF Page (Red) -->
    <g transform="translate(130, 130) rotate(-8 100 120)">
      <path d="M 0,0 L 130,0 L 180,50 L 180,230 Q 180,240 170,240 L 10,240 Q 0,240 0,230 Z" fill="url(#appRed)" />
      <!-- Corner Fold -->
      <path d="M 130,0 L 130,40 Q 130,50 140,50 L 180,50 Z" fill="#ffffff" fill-opacity="0.35" />
      <!-- Content lines (White representation of text) -->
      <rect x="25" y="80" width="130" height="10" rx="5" fill="#ffffff" fill-opacity="0.8" />
      <rect x="25" y="115" width="130" height="10" rx="5" fill="#ffffff" fill-opacity="0.8" />
      <rect x="25" y="150" width="90" height="10" rx="5" fill="#ffffff" fill-opacity="0.8" />
      <text x="25" y="210" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="38" fill="#ffffff" fill-opacity="0.95" letter-spacing="1">PDF</text>
    </g>

    <!-- Document 2: Converted Page (White with Red Accents) -->
    <g transform="translate(200, 150) rotate(8 100 120)">
      <path d="M 0,0 L 130,0 L 180,50 L 180,230 Q 180,240 170,240 L 10,240 Q 0,240 0,230 Z" fill="url(#docWhite)" stroke="#ef4444" stroke-width="3" />
      <!-- Corner Fold -->
      <path d="M 130,0 L 130,40 Q 130,50 140,50 L 180,50 Z" fill="#ef4444" fill-opacity="0.15" stroke="#ef4444" stroke-width="1.5" />
      <!-- Content lines (Red representation of text) -->
      <rect x="25" y="80" width="130" height="10" rx="5" fill="#ef4444" fill-opacity="0.3" />
      <rect x="25" y="115" width="130" height="10" rx="5" fill="#ef4444" fill-opacity="0.3" />
      <rect x="25" y="150" width="100" height="10" rx="5" fill="#ef4444" fill-opacity="0.3" />
      <text x="25" y="210" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="38" fill="#ef4444" fill-opacity="0.95" letter-spacing="1">OFD</text>
    </g>
  </g>

  <!-- Red Circular Conversion Arrows wrapping around the documents -->
  <g filter="url(#softShadow)">
    <!-- Right curved arrow (looping down) -->
    <path d="M 390,110 A 190,190 0 0,1 420,320" fill="none" stroke="url(#appRed)" stroke-width="14" stroke-linecap="round" />
    <path d="M 405,300 L 420,325 L 440,305" fill="none" stroke="url(#appRed)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Left curved arrow (looping up) -->
    <path d="M 120,400 A 190,190 0 0,1 90,190" fill="none" stroke="url(#appRed)" stroke-width="14" stroke-linecap="round" />
    <path d="M 105,210 L 90,185 L 70,205" fill="none" stroke="url(#appRed)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
