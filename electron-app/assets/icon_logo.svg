<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" /> <!-- deep indigo -->
      <stop offset="100%" stop-color="#311042" /> <!-- deep purple/crimson -->
    </linearGradient>
    
    <!-- Primary Red Gradient (PDF color) -->
    <linearGradient id="primaryRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444" /> <!-- bright red -->
      <stop offset="100%" stop-color="#991b1b" /> <!-- dark red -->
    </linearGradient>

    <!-- Glassmorphism Accent -->
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05" />
    </linearGradient>
    
    <!-- Glowing blue for tech/OCR/conversion -->
    <linearGradient id="glowBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" /> <!-- sky blue -->
      <stop offset="100%" stop-color="#0284c7" /> <!-- dark blue -->
    </linearGradient>
    
    <!-- Drop Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.5" />
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Card -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />

  <!-- Outer Ring (Decorative conversion/scan ring) -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#glowBlue)" stroke-width="4" stroke-opacity="0.15" />
  
  <g filter="url(#shadow)">
    <!-- Back Layer: Scanned Image / Document (Red) -->
    <g transform="translate(130, 110)">
      <!-- Base Document shape -->
      <path d="M 0,0 L 140,0 L 200,60 L 200,240 Q 200,250 190,250 L 10,250 Q 0,250 0,240 Z" fill="url(#primaryRed)" />
      <!-- Folded Corner -->
      <path d="M 140,0 L 140,50 Q 140,60 150,60 L 200,60 Z" fill="#7f1d1d" opacity="0.6" />
      <!-- PDF Text or icon pattern inside the red doc -->
      <text x="30" y="160" font-family="'Inter', sans-serif, system-ui" font-weight="900" font-size="54" fill="#ffffff" fill-opacity="0.9" letter-spacing="2">PDF</text>
      <!-- Horizontal lines representing image/grid -->
      <rect x="30" y="190" width="140" height="8" rx="4" fill="#ffffff" fill-opacity="0.4" />
      <rect x="30" y="210" width="100" height="8" rx="4" fill="#ffffff" fill-opacity="0.4" />
    </g>

    <!-- Front Layer: Searchable/Copyable Text Layer (Glassmorphism representing double-layer PDF / OCR) -->
    <g transform="translate(180, 160)">
      <!-- Glass Document Shape -->
      <path d="M 0,0 L 140,0 L 200,60 L 200,240 Q 200,250 190,250 L 10,250 Q 0,250 0,240 Z" fill="url(#glassGrad)" stroke="#ffffff" stroke-width="2.5" stroke-opacity="0.4" />
      <!-- Folded Corner -->
      <path d="M 140,0 L 140,50 Q 140,60 150,60 L 200,60 Z" fill="#ffffff" opacity="0.25" />
      <!-- Search/OCR cursor or magnifying glass -->
      <circle cx="150" cy="190" r="16" fill="none" stroke="url(#glowBlue)" stroke-width="5" />
      <line x1="161" y1="201" x2="175" y2="215" stroke="url(#glowBlue)" stroke-width="5" stroke-linecap="round" />
      <!-- Text lines (Searchable text layer) -->
      <rect x="25" y="70" width="150" height="8" rx="4" fill="#ffffff" fill-opacity="0.8" />
      <rect x="25" y="95" width="150" height="8" rx="4" fill="#ffffff" fill-opacity="0.8" />
      <rect x="25" y="120" width="110" height="8" rx="4" fill="#ffffff" fill-opacity="0.8" />
      <rect x="25" y="145" width="130" height="8" rx="4" fill="#ffffff" fill-opacity="0.8" />
    </g>
  </g>

  <!-- Glowing Circular Conversion Arrows -->
  <g filter="url(#glow)">
    <!-- Arc 1 -->
    <path d="M 140,430 A 210,210 0 0,1 70,170" fill="none" stroke="url(#glowBlue)" stroke-width="12" stroke-linecap="round" />
    <!-- Arrowhead 1 -->
    <path d="M 60,185 L 70,165 L 90,177" fill="none" stroke="url(#glowBlue)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Arc 2 -->
    <path d="M 372,82 A 210,210 0 0,1 442,342" fill="none" stroke="url(#glowBlue)" stroke-width="12" stroke-linecap="round" />
    <!-- Arrowhead 2 -->
    <path d="M 452,327 L 442,347 L 422,335" fill="none" stroke="url(#glowBlue)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>